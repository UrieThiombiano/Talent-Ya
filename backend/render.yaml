# Configuration Render — à utiliser comme référence
# (Render lit les paramètres depuis le dashboard, pas depuis ce fichier directement,
#  mais le format render.yaml est pris en charge si tu veux faire un Blueprint Deploy.)

services:
  - type: web
    name: talent-ya-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: talent-ya-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: talent-ya-db
    plan: free
    databaseName: talent_ya
    user: talent_ya
